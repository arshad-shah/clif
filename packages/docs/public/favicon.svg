<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="clif">
  <!--
    Favicon — the clif monogram on a deep ember tile so it reads clearly on
    both light and dark browser tabs.
  -->
  <defs>
    <linearGradient id="clifFav" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c76a"/>
      <stop offset="55%" stop-color="#d4860b"/>
      <stop offset="100%" stop-color="#9a5a05"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="#0e0a06" stroke="#3a2410" stroke-width="1.5"/>
  <g transform="translate(3,0)">
    <path d="M45.3 19.1 A20 20 0 1 0 45.3 44.9" stroke="url(#clifFav)" stroke-width="9" stroke-linecap="round"/>
    <rect x="38" y="25" width="13" height="13" rx="3" fill="#fef3e0"/>
  </g>
</svg>
