<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="clif">
  <defs>
    <linearGradient id="emberLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a533"/>
      <stop offset="55%" stop-color="#b06e08"/>
      <stop offset="100%" stop-color="#6b4204"/>
    </linearGradient>
    <linearGradient id="emberLightSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#emberLight)"/>
  <!-- Glossy top sheen -->
  <rect x="2" y="2" width="60" height="30" rx="14" fill="url(#emberLightSheen)"/>
  <!-- Inner hairline for depth -->
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25"
        fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="0.75"/>
  <!-- Outer rim — slightly darker for contrast on light bg -->
  <rect x="2" y="2" width="60" height="60" rx="14"
        fill="none" stroke="#2a1a0a" stroke-opacity="0.45" stroke-width="1"/>

  <!-- Chevron > -->
  <path d="M18 22 L30 32 L18 42"
        stroke="#1a0f04" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor underscore -->
  <rect x="34" y="40" width="14" height="4" rx="1.5" fill="#1a0f04"/>
</svg>
