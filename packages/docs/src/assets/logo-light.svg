<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="clif">
  <!--
    clif monogram — a geometric "c" (clif / CLI) opening onto a terminal
    cursor block. Light-theme variant: deeper copper gradient with an ink
    cursor so the mark stays legible on a cream background.
  -->
  <defs>
    <linearGradient id="clifLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a533"/>
      <stop offset="55%" stop-color="#b06e08"/>
      <stop offset="100%" stop-color="#6b4204"/>
    </linearGradient>
  </defs>
  <path d="M45.3 19.1 A20 20 0 1 0 45.3 44.9" stroke="url(#clifLight)" stroke-width="9" stroke-linecap="round"/>
  <rect x="38" y="25" width="13" height="13" rx="3" fill="#1a0f04"/>
</svg>
