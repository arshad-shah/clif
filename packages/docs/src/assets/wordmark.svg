<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 64" fill="none" role="img" aria-label="clif">
  <!--
    Horizontal lockup: clif monogram + wordmark. Mid-tone ember so it stays
    legible on both light and dark backgrounds (README, social cards).
  -->
  <defs>
    <linearGradient id="clifWm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c76a"/>
      <stop offset="55%" stop-color="#d4860b"/>
      <stop offset="100%" stop-color="#9a5a05"/>
    </linearGradient>
  </defs>
  <path d="M45.3 19.1 A20 20 0 1 0 45.3 44.9" stroke="url(#clifWm)" stroke-width="9" stroke-linecap="round"/>
  <rect x="38" y="25" width="13" height="13" rx="3" fill="#b06e08"/>
  <text x="74" y="42" font-family="ui-sans-serif, system-ui, Inter, -apple-system, sans-serif" font-size="36" font-weight="650" letter-spacing="0.5" fill="#d4860b">clif</text>
</svg>
