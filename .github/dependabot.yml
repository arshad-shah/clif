version: 2
updates:
  # npm dependencies across the whole pnpm workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      # Bundle dev-tooling updates together — fewer noisy PRs.
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "prettier"
          - "vitest"
          - "@vitest/*"
          - "tsdown"
          - "tsx"
          - "typescript"
          - "publint"
      types:
        patterns:
          - "@types/*"
      starlight:
        patterns:
          - "@astrojs/*"
          - "astro"
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - "dependencies"

  # Keep GitHub Actions on the latest secure versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "ci"
      - "dependencies"
