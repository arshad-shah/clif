name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref —
# faster feedback on rapid PR pushes, lower minutes burn.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint · typecheck · test · build · validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Format check (Biome + Prettier)
        run: pnpm format:check

      # Build clif BEFORE typecheck: the example package imports `clif`
      # via the workspace symlink, and clif's exports/types point at
      # `./dist/*` — without a fresh build, tsc reports
      # `Cannot find module 'clif'` in the example.
      - name: Build clif
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: E2E test (spawn the example CLI as a child process)
        run: pnpm --filter @arshad-shah/clif test:e2e

      - name: Build docs
        run: pnpm docs:build

      - name: publint
        run: pnpm --filter @arshad-shah/clif publint

      - name: Exports smoke test (ESM + CJS + types)
        run: pnpm --filter @arshad-shah/clif exports:smoke

      - name: Bundle size budget
        run: pnpm --filter @arshad-shah/clif size

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Audit doesn't need a matrix — one canonical Node version is enough.
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm audit fails the job on any high or critical vulnerability.
      # Adjust `--audit-level moderate` if we want to be stricter later.
      - name: pnpm audit (production deps only)
        run: pnpm audit --prod --audit-level high
