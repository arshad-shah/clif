name: Bug report
description: Something in clif behaves differently than documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more concrete the
        reproduction, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: clif version
      description: Output of `npm ls clif` (or your lockfile)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: "v24.15.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
        - WSL
        - Docker / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Paste a runnable snippet that imports `clif` and shows the bug.
        A link to a tiny repo or StackBlitz works too.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full output. Wrap with triple backticks for formatting.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Workarounds you've tried, suspected cause, related issues, etc.
